version: '3.8'

services:
  # 1. NGINX Web Server
  web:
    image: nginx:alpine
    container_name: newproject_nginx
    restart: unless-stopped
    ports:
      - "8092:80" # Akses web dari luar di port 8092
    volumes:
      - ./:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf # Pastikan buat folder & file konfigurasi nginx
    depends_on:
      - app

  # 2. PHP-FPM (Aplikasi)
  app:
    build:
      context: .
      dockerfile: Dockerfile # Sesuaikan path Dockerfile aplikasi Anda
    container_name: newproject_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      - db

  # 3. MySQL Database
  db:
    image: mysql:8.0
    container_name: newproject_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-newproject}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rahasia}
      MYSQL_USER: ${DB_USERNAME:-newuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-rahasia}
    ports:
      - "3311:3306" # Akses database dari DBeaver/Navicat di port 3311
    volumes:
      - newproject_dbdata:/var/lib/mysql

  # 4. phpMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: newproject_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rahasia}
    ports:
      - "8093:80" # Akses phpMyAdmin dari luar di port 8093
    depends_on:
      - db

volumes:
  newproject_dbdata:
